<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Profile — Task Board ❄️</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --bg:      #f2e4d0;
      --sidebar: #ead8be;
      --surface: #faf4ea;
      --surface2: #eddfc8;
      --border:  #b8956a;
      --accent:  #5c3317;
      --accent2: #7a4520;
      --accent3: #9a5c2e;
      --text:    #2e1a08;
      --muted:   #8a6040;
      --danger:  #9e2a10;
      --warn:    #a06010;
      --green:   #3a7048;
      --font:    'Nunito', 'Sarabun', sans-serif;
      --display: 'Playfair Display', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
      position: relative;
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(92,51,23,.06) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(184,149,106,.25) 0%, transparent 55%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b8956a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* SNOWFALL */
    #snow-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    /* GINGERBREAD DECO */
    .gingerbread-deco {
      position: fixed; bottom: 0; right: 24px;
      z-index: 1; pointer-events: none;
      animation: gingerbobble 3.5s ease-in-out infinite;
    }
    @keyframes gingerbobble {
      0%, 100% { transform: translateY(0) rotate(3deg); }
      50%       { transform: translateY(-10px) rotate(-3deg); }
    }
    .gingerbread-deco svg { width: 90px; height: 110px; }

    /* APP */
    .app { display: flex; height: 100vh; overflow: hidden; position: relative; z-index: 5; }

    /* SIDEBAR */
    .sidebar {
      width: 260px; height: 100vh; overflow-y: auto;
      background: linear-gradient(180deg, #e8d4b4 0%, #dfc9a4 100%);
      border-right: 2px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      box-shadow: 3px 0 20px rgba(92,51,23,.1);
    }
    .sb-brand { display: flex; align-items: center; gap: .75rem; padding: 1.4rem 1.3rem 1.1rem; border-bottom: 2px solid var(--border); }
    .sb-brand-icon { width: 32px; height: 32px; border-radius: 9px; background: var(--accent); display: grid; place-items: center; color: var(--surface); font-size: .9rem; flex-shrink: 0; box-shadow: 0 3px 10px rgba(92,51,23,.3); }
    .sb-brand-name { font-family: var(--display); font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: .02em; }
    .sb-nav { padding: .75rem .6rem; flex: 1; }
    .sb-item { display: flex; align-items: center; gap: .65rem; padding: .7rem .9rem; border-radius: 12px; cursor: pointer; font-size: .88rem; font-weight: 700; color: var(--muted); transition: all .2s; text-decoration: none; margin-bottom: .22rem; }
    .sb-item:hover { background: rgba(92,51,23,.08); color: var(--text); }
    .sb-item.active { background: rgba(92,51,23,.12); color: var(--accent); }
    .sb-item-icon { font-size: 1rem; width: 24px; text-align: center; }
    .sb-footer { padding: 1rem; border-top: 2px solid var(--border); }
    .sb-user { display: flex; align-items: center; gap: .65rem; }
    .sb-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; font-size: .9rem; font-weight: 800; color: var(--surface); flex-shrink: 0; box-shadow: 0 3px 10px rgba(92,51,23,.3); border: 2px solid var(--surface2); }
    .sb-uname { font-size: .85rem; font-weight: 800; color: var(--text); }
    .sb-role-badge { display: inline-block; font-size: .6rem; font-weight: 800; padding: .1rem .5rem; border-radius: 20px; background: rgba(92,51,23,.12); color: var(--accent); text-transform: uppercase; letter-spacing: .06em; }
    .sb-role-badge.admin { background: rgba(160,96,16,.15); color: var(--warn); }
    .sb-logout { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: .25rem; transition: color .2s; border-radius: 8px; }
    .sb-logout:hover { color: var(--danger); background: rgba(158,42,16,.08); }

    /* MAIN */
    .main { flex: 1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .main-header {
      padding: 1.3rem 2rem 1rem;
      border-bottom: 2px solid var(--border);
      background: rgba(242,228,208,.94);
      backdrop-filter: blur(10px);
    }
    .main-header-sub { font-size: .65rem; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; margin-bottom: .15rem; }
    .main-title { font-family: var(--display); font-size: 1.55rem; font-weight: 700; color: var(--accent); letter-spacing: .02em; }
    .main-body { flex: 1; overflow-y: auto; overflow-x: hidden; width: 100%; }

    /* CARDS */
    .inner { padding: 1.6rem 2rem; max-width: 620px; }

    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 1.6rem;
      margin-bottom: 1.4rem;
      box-shadow: 0 4px 20px rgba(92,51,23,.07);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: repeating-linear-gradient(90deg,
        var(--accent) 0px, var(--accent) 18px,
        var(--accent3) 18px, var(--accent3) 36px,
        var(--surface2) 36px, var(--surface2) 54px);
    }

    .profile-top { display: flex; align-items: center; gap: 1rem; padding-bottom: 1.2rem; border-bottom: 2px solid var(--border); margin-bottom: 1.4rem; }

    .avatar-upload { position: relative; display: inline-block; cursor: pointer; }
    .avatar-upload:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay { position: absolute; inset: 0; border-radius: 50%; background: rgba(92,51,23,.45); display: grid; place-items: center; opacity: 0; transition: opacity .2s; font-size: 1rem; color: #fff; }
    .avatar-input { display: none; }
    .avatar-preview { width: 62px; height: 62px; border-radius: 50%; object-fit: cover; box-shadow: 0 3px 12px rgba(92,51,23,.22); }

    .p-avatar { width: 62px; height: 62px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; font-size: 1.5rem; font-weight: 800; color: var(--surface); flex-shrink: 0; box-shadow: 0 3px 12px rgba(92,51,23,.25); border: 3px solid var(--surface2); }
    .p-name { font-family: var(--display); font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: .3rem; }
    .p-role { display: inline-block; font-size: .62rem; font-weight: 800; padding: .15rem .6rem; border-radius: 20px; background: rgba(92,51,23,.1); color: var(--accent); text-transform: uppercase; letter-spacing: .08em; }
    .p-role.admin { background: rgba(160,96,16,.15); color: var(--warn); }

    .section-label { font-size: .65rem; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }

    .fg { margin-bottom: 1rem; }
    .fg label { display: block; font-size: .65rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .35rem; }
    .fg input, .fg textarea {
      width: 100%; background: var(--surface2);
      border: 2px solid var(--border); border-radius: 11px;
      padding: .65rem 1rem; color: var(--text);
      font-family: var(--font); font-size: .88rem;
      outline: none; transition: all .2s;
    }
    .fg input:focus, .fg textarea:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(92,51,23,.1); }
    .fg input:disabled { opacity: .45; background: var(--bg); }
    .fg textarea { resize: vertical; min-height: 80px; }

    .btn-save {
      width: 100%; padding: .78rem;
      background: var(--accent); color: var(--surface);
      border: none; border-radius: 12px;
      font-family: var(--font); font-size: .9rem; font-weight: 800;
      cursor: pointer; transition: all .2s;
      letter-spacing: .04em;
      box-shadow: 0 4px 14px rgba(92,51,23,.3);
    }
    .btn-save:hover { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 7px 18px rgba(92,51,23,.4); }
    .btn-save:disabled { opacity: .5; transform: none; }

    .msg { margin-top: .75rem; padding: .55rem 1rem; border-radius: 10px; font-size: .78rem; display: none; }
    .msg.err { background: rgba(158,42,16,.07); border: 1.5px solid var(--danger); color: var(--danger); display: block; }
    .msg.ok  { background: rgba(58,112,72,.08);  border: 1.5px solid var(--green);  color: var(--green);  display: block; }

    .jwt-box {
      background: var(--surface2);
      border: 2px solid var(--border); border-radius: 11px;
      padding: 1rem;
      font-family: 'Courier New', monospace; font-size: .68rem;
      color: var(--accent2); word-break: break-all; line-height: 1.7;
      margin-bottom: .75rem;
    }

    .btn-copy {
      padding: .44rem 1rem;
      background: var(--surface2); border: 2px solid var(--border);
      border-radius: 9px; color: var(--muted);
      font-family: var(--font); font-size: .78rem; font-weight: 700;
      cursor: pointer; transition: all .2s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

    .admin-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(92,51,23,.07);
    }
    .admin-card-hdr {
      padding: 1rem 1.4rem;
      border-bottom: 2px solid var(--border);
      font-size: .65rem; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); background: var(--surface2);
    }

    table { width: 100%; border-collapse: collapse; }
    th { padding: .75rem 1.1rem; font-size: .65rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); text-align: left; border-bottom: 2px solid var(--border); background: var(--surface2); }
    td { padding: .75rem 1.1rem; font-size: .83rem; border-bottom: 1px solid rgba(184,149,106,.3); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(92,51,23,.03); }

    .badge { display: inline-block; font-size: .6rem; font-weight: 800; padding: .18rem .55rem; border-radius: 20px; text-transform: uppercase; letter-spacing: .06em; }
    .b-admin  { background: rgba(160,96,16,.15);  color: var(--warn); }
    .b-member { background: rgba(92,51,23,.1);    color: var(--accent); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 20px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent3); }
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .hidden { display: none !important; }
    .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: sp .5s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes sp { to { transform: rotate(360deg) } }
  </style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<!-- Gingerbread Man -->
<div class="gingerbread-deco">
  <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="118" rx="24" ry="3.5" fill="rgba(92,51,23,.18)"/>
    <ellipse cx="38" cy="98" rx="11" ry="14" fill="#c8823a" transform="rotate(-12 38 98)"/>

<div class="app">
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-icon">☕</div>
      <span class="sb-brand-name">Task Board</span>
    </div>
    <nav class="sb-nav">
      <a class="sb-item" href="index.html">
        <span class="sb-item-icon">✓</span> Tasks
      </a>
      <a class="sb-item active">
        <span class="sb-item-icon">◎</span> Profile &amp; JWT
      </a>
    </nav>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-av">?</div>
        <div>
          <div class="sb-uname" id="sb-name">-</div>
          <span class="sb-role-badge" id="sb-role">member</span>
        </div>
        <button class="sb-logout" onclick="doLogout()" title="ออกจากระบบ">✕</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <div class="main-header-sub">❄ Account</div>
      <div class="main-title">Profile &amp; JWT</div>
    </div>
    <div class="main-body">
      <div class="inner">

        <div class="card">
          <div class="profile-top">
            <label class="avatar-upload" title="คลิกเพื่อเปลี่ยนรูป">
              <img id="p-av-img" class="avatar-preview" src="" style="display:none" />
              <div class="p-avatar" id="p-av" style="display:grid">?</div>
              <div class="avatar-overlay">📷</div>
              <input type="file" class="avatar-input" id="avatar-file" accept="image/*" onchange="onAvatarFile(event)" />
            </label>
            <div>
              <div class="p-name" id="p-name">-</div>
              <span class="p-role" id="p-role">member</span>
            </div>
          </div>

          <div class="section-label">Edit Profile</div>

          <div class="fg">
            <label>Display Name</label>
            <input id="p-display" placeholder="ชื่อที่แสดง" />
          </div>
          <div class="fg">
            <label>Bio</label>
            <textarea id="p-bio" placeholder="แนะนำตัวสั้นๆ…"></textarea>
          </div>
          <div class="fg" id="avatar-url-group">
            <label>Avatar URL <span style="font-size:.65rem;color:var(--muted)">(หรืออัปโหลดรูปด้านบน)</span></label>
            <input id="p-avatar" type="url" placeholder="https://…" />
          </div>
          <div class="fg">
            <label>Username (แก้ไขไม่ได้)</label>
            <input id="p-uname" disabled />
          </div>
          <div class="fg">
            <label>Email (แก้ไขไม่ได้)</label>
            <input id="p-email" disabled />
          </div>

          <button class="btn-save" id="save-btn" onclick="saveProfile()">บันทึกการเปลี่ยนแปลง</button>
          <div class="msg" id="p-msg"></div>
        </div>

        <div class="card">
          <div class="section-label">JWT Token</div>
          <div class="jwt-box" id="jwt-box">-</div>
          <button class="btn-copy" onclick="copyJwt()">คัดลอก Token</button>
        </div>

        <div class="admin-card hidden" id="admin-card">
          <div class="admin-card-hdr">Admin — รายชื่อผู้ใช้ทั้งหมด</div>
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Username</th><th>Email</th><th>Role</th>
              </tr>
            </thead>
            <tbody id="user-tbody">
              <tr><td colspan="4" style="text-align:center;padding:1.5rem;color:var(--muted)">❄ กำลังโหลด…</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  /* SNOWFALL */
  const canvas = document.getElementById('snow-canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const CHARS = ['❄','❅','❆','·','•'];
  const flakes = [];
  for (let i = 0; i < 55; i++) {
    flakes.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 13 + 5,
      speed: Math.random() * 1.0 + 0.35,
      drift: Math.random() * 0.5 - 0.25,
      opacity: Math.random() * 0.5 + 0.15,
      char: CHARS[Math.floor(Math.random() * CHARS.length)],
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: Math.random() * 0.02 + 0.008,
      color: ['#ffffff','#f5e8d0','#e8d4b4','#d4b896'][Math.floor(Math.random() * 4)],
    });
  }
  function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    flakes.forEach(s => {
      s.wobble += s.wobbleSpeed;
      s.x += s.drift + Math.sin(s.wobble) * 0.4;
      s.y += s.speed;
      if (s.y > canvas.height + 20) { s.y = -20; s.x = Math.random() * canvas.width; }
      if (s.x > canvas.width  + 20) s.x = -20;
      if (s.x < -20)                 s.x = canvas.width + 20;
      ctx.save();
      ctx.globalAlpha = s.opacity;
      ctx.fillStyle = s.color;
      ctx.font = `${s.size}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(s.char, s.x, s.y);
      ctx.restore();
    });
    requestAnimationFrame(drawSnow);
  }
  drawSnow();

  /* APP LOGIC */
  (async () => {
    const token = getToken();
    if (!token) { location.href = '/index.html'; return; }
    document.getElementById('jwt-box').textContent = token;
    try {
      const d = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users/me`);
      const p = d.profile || d;
      renderProfile(p);
      if (p.role === 'admin') {
        document.getElementById('admin-card').classList.remove('hidden');
        loadUsers();
      }
    } catch (e) { location.href = '/index.html'; }
  })();

  function onAvatarFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('รูปต้องไม่เกิน 2MB'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const base64 = ev.target.result;
      document.getElementById('p-av-img').src = base64;
      document.getElementById('p-av-img').style.display = 'block';
      document.getElementById('p-av').style.display = 'none';
      document.getElementById('p-avatar').value = base64;
      document.getElementById('avatar-url-group').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function renderProfile(p) {
    const name = p.display_name || p.username || 'User';
    ['sb-av','p-av'].forEach(id => document.getElementById(id).textContent = name.charAt(0).toUpperCase());
    document.getElementById('sb-name').textContent = name;
    document.getElementById('p-name').textContent = name;
    const pr = document.getElementById('p-role');
    pr.textContent = p.role || 'member';
    pr.className = 'p-role' + (p.role === 'admin' ? ' admin' : '');
    const sr = document.getElementById('sb-role');
    sr.textContent = p.role || 'member';
    sr.className = 'sb-role-badge' + (p.role === 'admin' ? ' admin' : '');
    const grp = document.getElementById('avatar-url-group');
    grp.style.display = (p.avatar_url && p.avatar_url.startsWith('data:')) ? 'none' : 'block';
    if (p.avatar_url) {
      const img = document.getElementById('p-av-img');
      img.src = p.avatar_url;
      img.style.display = 'block';
      document.getElementById('p-av').style.display = 'none';
    }
    document.getElementById('p-display').value = p.display_name || '';
    document.getElementById('p-bio').value     = p.bio || '';
    document.getElementById('p-avatar').value  = p.avatar_url || '';
    document.getElementById('p-uname').value   = p.username || '';
    document.getElementById('p-email').value   = p.email || '';
  }

  async function saveProfile() {
    const btn = document.getElementById('save-btn'), msg = document.getElementById('p-msg');
    msg.className = 'msg';
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>กำลังบันทึก…';
    try {
      const d = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users/me`, {
        method: 'PUT',
        body: JSON.stringify({
          display_name: document.getElementById('p-display').value.trim(),
          bio:          document.getElementById('p-bio').value.trim(),
          avatar_url:   document.getElementById('p-avatar').value.trim(),
        })
      });
      renderProfile(d.profile || d);
      msg.className = 'msg ok';
      msg.textContent = '❄ บันทึกสำเร็จ';
    } catch (e) {
      msg.className = 'msg err';
      msg.textContent = e.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'บันทึกการเปลี่ยนแปลง';
    }
  }

  async function loadUsers() {
    const tbody = document.getElementById('user-tbody');
    try {
      const d = await apiFetch(`${CONFIG.USER_SERVICE_URL}/api/users`);
      const users = Array.isArray(d) ? d : (d.users || []);
      tbody.innerHTML = users.map(u => `<tr>
        <td style="color:var(--muted)">${u.user_id || u.id}</td>
        <td style="font-weight:800">${u.username || '-'}</td>
        <td style="color:var(--muted)">${u.email || '-'}</td>
        <td><span class="badge b-${u.role || 'member'}">${u.role || 'member'}</span></td>
      </tr>`).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:var(--danger);text-align:center;padding:1rem">${e.message}</td></tr>`;
    }
  }

  function copyJwt() {
    navigator.clipboard.writeText(getToken() || '').then(() => alert('คัดลอก Token แล้ว'));
  }

  function doLogout() { removeToken(); location.href = '/index.html'; }
</script>
</body>
</html>
