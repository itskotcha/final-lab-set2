# ─────────────────────────────────────────────
# Nginx: API Gateway + Rate Limiter สำหรับ Task Board
# Week 12 Security Architecture
# ─────────────────────────────────────────────

# Rate limiting zones
# auth zone: จำกัด 5 requests/นาที ต่อ IP (กัน Brute-force)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# api zone: จำกัด 30 requests/นาที ต่อ IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# ─── ต้องระบุ resolver เพื่อให้ Nginx resolve Railway hostnames ได้ ───
resolver 8.8.8.8 8.8.4.4 valid=30s;

server {
    listen 8080;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # ─── Gateway Health check (Railway probe ยิงตรงมาที่นี่) ───
    location = /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ─── Auth routes (public - ไม่ต้อง JWT) ───
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        set $auth_upstream https://auth-service-production-7268.up.railway.app;
        proxy_pass         $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              auth-service-production-7268.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # ─── /api/tasks (ไม่มี trailing slash - กัน 301) ───
    location = /api/tasks {
        limit_req zone=api_limit burst=10 nodelay;

        set $task_upstream https://task-service-production-747e.up.railway.app;
        proxy_pass         $task_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              task-service-production-747e.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_ssl_server_name on;
    }

    # ─── Task service health check (bypass rate limit + auth) ───
    location = /api/tasks/health {
        access_log off;

        set $task_upstream https://task-service-production-747e.up.railway.app;
        proxy_pass         $task_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              task-service-production-747e.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # ─── Task routes (protected - ต้อง JWT) ───
    location /api/tasks/ {
        limit_req zone=api_limit burst=10 nodelay;

        set $task_upstream https://task-service-production-747e.up.railway.app;
        proxy_pass         $task_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              task-service-production-747e.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_ssl_server_name on;
    }

    # ─── User service health check (bypass rate limit + auth) ───
    location = /api/users/health {
        access_log off;

        set $user_upstream https://user-service-production-57b1.up.railway.app;
        proxy_pass         $user_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              user-service-production-57b1.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # ─── User routes (protected - ต้อง JWT) ───
    location /api/users/ {
        limit_req zone=api_limit burst=10 nodelay;

        set $user_upstream https://user-service-production-57b1.up.railway.app;
        proxy_pass         $user_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              user-service-production-57b1.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_ssl_server_name on;
    }

    # ─── Frontend (static files) ───
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─── Rate limit error page ───
    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Too Many Requests","message":"ส่ง request มากเกินไป กรุณารอสักครู่"}';
        add_header Content-Type application/json;
    }
}