# ─────────────────────────────────────────────
# Nginx API Gateway - Task Board Microservices
# Railway Compatible Version (Fixed)
# ─────────────────────────────────────────────

# Rate limit zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# ─────────────────────────────────────────────
# IMPORTANT: Replace service names below with
# your EXACT Railway service names (case-sensitive)
# Dashboard → Project → Service name shown at top
# ─────────────────────────────────────────────

upstream auth_service {
    server auth.railway.internal:3001;
    keepalive 16;
}

upstream task_service {
    server task.railway.internal:3002;
    keepalive 16;
}

upstream user_service {
    server user.railway.internal:3003;
    keepalive 16;
}

server {
    listen 8080;
    server_name localhost;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # ─────────────────────────────────────────────
    # Gateway Health Check
    # ─────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ─────────────────────────────────────────────
    # Auth Routes
    # ─────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://auth_service;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_intercept_errors on;
    }

    # ─────────────────────────────────────────────
    # Task Routes
    # ─────────────────────────────────────────────
    location = /api/tasks/health {
        access_log off;

        proxy_pass http://task_service;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    10s;
    }

    location /api/tasks/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://task_service;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_intercept_errors on;
    }

    # ─────────────────────────────────────────────
    # User Routes
    # ─────────────────────────────────────────────
    location = /api/users/health {
        access_log off;

        proxy_pass http://user_service;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    10s;
    }

    location /api/users/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://user_service;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_intercept_errors on;
    }

    # ─────────────────────────────────────────────
    # Frontend Static Files (React / Vue / etc.)
    # ─────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────
    # Error Pages
    # ─────────────────────────────────────────────

    # Rate limit
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
    }

    # Bad Gateway / upstream down
    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        internal;
        default_type application/json;
        return 502 '{"error":"Service Unavailable","message":"Backend service is temporarily unavailable."}';
    }
}