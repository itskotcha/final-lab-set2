# ─────────────────────────────────────────────
# Nginx API Gateway - Task Board Microservices
# Railway Compatible Version (Fixed with Resolver)
# ─────────────────────────────────────────────

# Rate limit zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 8080;
    server_name localhost;

    # ✅ 1. เพิ่ม Resolver เพื่อให้ NGINX หา IP ของ Railway Internal Network ได้
    # 127.0.0.11 คือ DNS มาตรฐานของ Docker/Container 
    resolver 127.0.0.11 valid=30s;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # Gateway Health Check
    location = /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ─────────────────────────────────────────────
    # Auth Routes
    # ─────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        # ✅ 2. ใช้ตัวแปร (Variable) แทนการเขียนชื่อตรงๆ เพื่อป้องกัน Nginx ไม่ยอม Start
        set $auth_backend "http://auth.railway.internal:3001";
        proxy_pass $auth_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_intercept_errors on;
    }

    # ─────────────────────────────────────────────
    # Task Routes
    # ─────────────────────────────────────────────
    location /api/tasks/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        # ✅ 2. ใช้ตัวแปรสำหรับ Task Service
        set $task_backend "http://task.railway.internal:3002";
        proxy_pass $task_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_intercept_errors on;
    }

    # ─────────────────────────────────────────────
    # User Routes
    # ─────────────────────────────────────────────
    location /api/users/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        # ✅ 2. ใช้ตัวแปรสำหรับ User Service
        set $user_backend "http://user.railway.internal:3003";
        proxy_pass $user_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_intercept_errors on;
    }

    # ─────────────────────────────────────────────
    # Frontend Static Files
    # ─────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Error Pages
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded."}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        internal;
        default_type application/json;
        return 502 '{"error":"Service Unavailable","message":"Backend service is starting or down."}';
    }
}