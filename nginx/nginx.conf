# ─────────────────────────────────────────────
# Nginx: API Gateway + Rate Limiter สำหรับ Task Board
# Week 12 Security Architecture
# ─────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

resolver 8.8.8.8 8.8.4.4 valid=30s;

server {
    listen 8080;
    server_name localhost;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         https://auth-service-production-7f4a.up.railway.app/;
        proxy_http_version 1.1;
        proxy_set_header   Host              auth-service-production-7f4a.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    location = /api/tasks {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         https://tasks-service-production.up.railway.app/tasks;
        proxy_http_version 1.1;
        proxy_set_header   Host              tasks-service-production.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_ssl_server_name on;
    }

    location = /api/tasks/health {
        access_log off;

        proxy_pass         https://tasks-service-production.up.railway.app/tasks/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              tasks-service-production.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    location /api/tasks/ {
        limit_req zone=api_limit burst=10 nodelay;

        rewrite ^/api/tasks/(.*)$ /tasks/$1 break;
        proxy_pass         https://tasks-service-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header   Host              tasks-service-production.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_ssl_server_name on;
    }

    location = /api/users/health {
        access_log off;

        proxy_pass         https://user-service-production-3500.up.railway.app/users/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              user-service-production-3500.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    location /api/users/ {
        limit_req zone=api_limit burst=10 nodelay;

        rewrite ^/api/users/(.*)$ /users/$1 break;
        proxy_pass         https://user-service-production-3500.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header   Host              user-service-production-3500.up.railway.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_ssl_server_name on;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Too Many Requests","message":"ส่ง request มากเกินไป กรุณารอสักครู่"}';
        add_header Content-Type application/json;
    }
}